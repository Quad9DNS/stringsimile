[build]
pre-build = [
    "apt-get update && apt-get --assume-yes install librdkafka-dev libhyperscan-dev"
]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/esensar/x86_64-unknown-linux-gnu:2.36"
pre-build = [
    'apt-get update && apt-get -y upgrade',
    'apt-get -y install gcc-10 librdkafka-dev libhyperscan-dev && update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60',
]
