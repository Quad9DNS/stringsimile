name: Build binaries

on:
  release:
    types: [ created ]
  workflow_dispatch:

permissions:
  # Write required for the release type
  contents: write

env:
  RUSTFLAGS: "-C target-cpu=x86-64-v3"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant: [default, all-dynamic, basic]
        target: [x86_64-unknown-linux-gnu]
        package: [deb, rpm, binary]
        include:
          - target: x86_64-unknown-linux-gnu
            output-file-name: gnu
          - variant: all-dynamic
            needs-librdkafka: true
          - package: deb
            needs-cargo-deb: true
            build-deb: true
            target-dir: debian
          - package: rpm
            needs-cargo-generate-rpm: true
            needs-binary-build: true
            build-rpm: true
            target-dir: generate-rpm
          - package: binary
            needs-binary-build: true
            target-dir: binary-package
          - target: x86_64-unknown-linux-gnu
            package: deb
            needs-cross: true
          - target: x86_64-unknown-linux-gnu
            variant: all-dynamic
            package: deb
            needs-cross: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          target: ${{ matrix.target }}

      - name: Install libhyperscan
        run: sudo apt-get update -y && sudo apt-get -y install libhyperscan-dev

      - name: Install librdkafka
        if: ${{ matrix.needs-librdkafka }}
        run: sudo apt-get update -y && sudo apt-get -y install librdkafka-dev

      - name: Setup rust cross
        if: ${{ matrix.needs-cross }}
        run: cargo install cross

      - name: Install scdoc
        run: sudo apt-get update -y && sudo apt-get -y install scdoc

      - name: Build docs
        run: make doc

      - name: Install cargo-deb
        if: ${{ matrix.needs-cargo-deb }}
        run: cargo install cargo-deb

      - name: Install cargo-generate-rpm
        if: ${{ matrix.needs-cargo-generate-rpm }}
        run: cargo install cargo-generate-rpm

      - name: Build binary
        if: ${{ matrix.needs-binary-build }}
        env:
          CARGO_TARGET_DIR: "target/${{ matrix.variant }}"
        run: |
          cargo build --target "${{ matrix.target }}" --release --no-default-features --features "${{ matrix.variant }}"
          # Binary also needs docs and examples
          mkdir -p "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}/man"
          cp "target/${{ matrix.variant }}/${{ matrix.target }}/release/stringsimile" "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}/stringsimile"
          cp target/man/* "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}/man"
          cp distribution/config.yaml "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}/config.yaml"
          mkdir -p "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}/rules"
          cp distribution/rules/* "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}/rules/"

      - name: Build deb
        if: ${{ matrix.build-deb && !matrix.needs-cross }}
        env:
          CARGO_TARGET_DIR: "target/${{ matrix.variant }}"
        run: |
          cargo deb --variant "${{ matrix.variant }}" --target "${{ matrix.target }}"

      - name: Install Hyperscan
        if: ${{ matrix.build-deb && matrix.needs-cross }}
        uses: flier/install-hyperscan@8e7f62dc4145d293ea1266e1d973fd5ba9ef533e # no version, main from Dec 1, 2024
        with:
          hyperscan_version: 5.4.1
          build_static_lib: on
          src_dir: ${{ runner.temp }}/hyperscan/
          install_prefix: ${{ github.workspace }}/dist
          cache_key: ${{ runner.os }}-build-hyperscan-${{ matrix.hyperscan }}-pcre-${{ matrix.pcre }}-${{ secrets.CACHE_VERSION }}

      - name: Cross build deb
        if: ${{ matrix.build-deb && matrix.needs-cross }}
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/dist/lib/pkgconfig
          HYPERSCAN_ROOT: ${{ github.workspace }}/dist
        run: |
          cross build --target "${{ matrix.target }}" --release --no-default-features --features "${{ matrix.variant }}"
          cp "target/${{ matrix.target }}/release/stringsimile" "target/release/stringsimile"
          cargo deb --no-build --variant "${{ matrix.variant }}" --target "${{ matrix.target }}"
          mkdir -p "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}"
          mv "target/${{ matrix.target-dir }}" "target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}"

      - name: Build rpm
        if: ${{ matrix.build-rpm }}
        run: |
          cargo generate-rpm -p bin/stringsimile-service --target-dir "target/${{ matrix.variant }}" --variant "${{ matrix.variant }}" --target "${{ matrix.target }}"

      - name: Upload build files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stringsimile-${{ matrix.variant }}-${{ matrix.output-file-name }}-${{ matrix.package }}
          path: ./target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}

      - name: Upload build files
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        if: ${{ github.event_name == 'release' }}
        with:
          files: |
            LICENSE
            ./target/${{ matrix.variant }}/${{ matrix.target }}/${{ matrix.target-dir }}
